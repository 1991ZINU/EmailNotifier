name: CI - Code Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'requirements.txt'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'requirements.txt'

jobs:
  validate:
    name: Syntax & Import Check
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile src/main.py
          python -m py_compile src/notifier.py
          echo "Syntax check passed."

      - name: Check imports
        run: |
          python -c "import yaml; import imapclient; import pystray; from PIL import Image; import winotify; print('All imports OK')"
